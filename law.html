<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laws & Rights for Women's Safety</title>
    <style>
        :root {
            --deep-wine: #000000;
            --secondary-surface: #531f1f;
            --accent-burgundy: #9a3e55;
            --accent-pink: #f99099;
            --text-light: #FFF5F5;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-wine);
            background-image: radial-gradient(circle at 50% 50%, #2d0a0a 0%, #1a0505 100%);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.8;
        }

        /* Language Nav */
        .lang-nav {
            position: sticky;
            top: 0;
            background: rgba(45, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 2px solid var(--accent-pink);
            z-index: 1000;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--accent-pink);
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: var(--transition);
        }

        .lang-btn.active {
            background: var(--accent-pink);
            color: var(--deep-wine);
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: 3rem; color: var(--accent-pink); margin-bottom: 10px; }
        header p { font-size: 1.2rem; opacity: 0.8; }

        .law-section {
            background: var(--secondary-surface);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 94, 108, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .law-section:hover { border-color: var(--accent-pink); transform: translateY(-5px); }

        h2 { color: var(--accent-pink); margin-bottom: 20px; border-bottom: 1px solid var(--accent-burgundy); padding-bottom: 10px; }
        h3 { color: #FFB3B9; margin: 20px 0 10px; }
        ul { padding-left: 25px; margin-bottom: 20px; }
        li { margin-bottom: 10px; }

        /* Comment Section */
        .comment-area {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            margin-top: 60px;
        }

        .comment-form input, .comment-form textarea {
            width: 100%;
            background: var(--deep-wine);
            border: 1px solid #444;
            color: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .submit-btn {
            background: var(--accent-pink);
            color: var(--deep-wine);
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .comment-list { margin-top: 30px; }
        .comment-item {
            background: var(--secondary-surface);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-pink);
        }

        .thanks-section { text-align: center; padding: 60px 0; font-size: 1.5rem; color: var(--accent-pink); }

        .signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: 'Brush Script MT', cursive;
            color: var(--accent-pink);
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 94, 108, 0.5);
        }
    </style>
</head>
<body>

    <div class="lang-nav">
        <button class="lang-btn active" onclick="updateContent('en')">English</button>
        <button class="lang-btn" onclick="updateContent('hi')">हिंदी</button>
        <button class="lang-btn" onclick="updateContent('mr')">मराठी</button>
    </div>

    <div class="container">
        <header id="page-header">
            </header>

        <div id="main-content">
            </div>

        <div class="comment-area">
            <h2 id="comment-title">Comments</h2>
            <div class="comment-form">
                <input type="text" id="name" placeholder="Your Name">
                <textarea id="comment" rows="4" placeholder="Your Thought"></textarea>
                <button class="submit-btn" onclick="postComment()">Submit</button>
            </div>
            <div id="comment-list" class="comment-list"></div>
        </div>

        <div class="thanks-section" id="thanks"></div>
    </div>

    <div class="signature">Sneha Sharma</div>

    <script>
        const data = {
            en: {
                title: "Laws & Rights for Women’s Safety",
                sub: "Legal Framework for Women’s Safety in India",
                intro: "India has established an extensive legal framework aimed at protecting women from violence, abuse, harassment, and exploitation. Over time, amendments and new legislation have strengthened safeguards, expanded definitions of offences, and introduced stricter punishments. Understanding these laws is essential for awareness, prevention, and access to justice.",
                laws: `
                <div class="law-section">
                    <h2>1️⃣ Bharatiya Nyaya Sanhita (BNS), 2023</h2>
                    <p>(Replaced Indian Penal Code – IPC)</p>
                    <p>The Bharatiya Nyaya Sanhita governs major criminal offences, including crimes against women.</p>
                    <h3>✔ Sexual Offences</h3>
                    <p><strong>Rape (Section 63 – BNS)</strong></p>
                    <p>Definition: Non-consensual sexual acts under legally defined conditions.</p>
                    <p>Punishment:</p>
                    <ul>
                        <li>Minimum: 10 years imprisonment</li>
                        <li>May extend to: Life imprisonment</li>
                        <li>In aggravated cases → Life imprisonment / Death penalty</li>
                    </ul>
                    <h3>✔ Aggravated Rape</h3>
                    <p>Includes minor victims, custodial abuse, authority misuse, or gang rape.</p>
                    <p>Punishment: Rigorous imprisonment (20 years to life) or Death penalty.</p>
                    <h3>✔ Sexual Harassment (Section 75 – BNS)</h3>
                    <p>Includes unwelcome contact, demand for sexual favors, showing pornography, or sexually colored remarks.</p>
                    <p>Punishment: Up to 3 years imprisonment, fine or both.</p>
                    <h3>✔ Assault with Intent to Disrobe (Section 76 – BNS)</h3>
                    <p>Punishment: 3 to 7 years imprisonment and fine.</p>
                    <h3>✔ Voyeurism (Section 77 – BNS)</h3>
                    <p>Watching / capturing images of a woman’s private acts. Punishment: 1-3 years (1st time), 3-7 years (subsequent).</p>
                    <h3>✔ Stalking (Section 78 – BNS)</h3>
                    <p>Repeated following / contacting despite disinterest. Punishment: Up to 3 years and fine.</p>
                </div>

                <div class="law-section">
                    <h2>2️⃣ Protection of Children from Sexual Offences (POCSO) Act, 2012</h2>
                    <p>Special law protecting minors (below 18).</p>
                    <h3>✔ Key Protections</h3>
                    <ul>
                        <li>Gender-neutral law</li>
                        <li>Covers sexual assault, harassment, pornography</li>
                        <li>Child-friendly judicial procedures</li>
                    </ul>
                    <h3>✔ Punishments</h3>
                    <ul>
                        <li>Sexual Assault: 3 to 5 years</li>
                        <li>Aggravated Sexual Assault: 5 to 7 years</li>
                        <li>Penetrative Sexual Assault: 10 years to life</li>
                        <li>Aggravated Penetrative Assault: Life / Death penalty</li>
                    </ul>
                </div>

                <div class="law-section">
                    <h2>3️⃣ Protection of Women from Domestic Violence Act (PWDVA), 2005</h2>
                    <h3>✔ Covers Multiple Forms of Abuse</h3>
                    <p>Physical, Emotional, Sexual, Verbal, and Economic abuse.</p>
                    <h3>✔ Legal Remedies</h3>
                    <p>Protection orders, residence rights, monetary relief, custody orders, and compensation.</p>
                    <p>Punishment for Violation: Up to 1 year imprisonment or fine.</p>
                </div>

                <div class="law-section">
                    <h2>4️⃣ Cruelty by Husband or Relatives (Section 85 – BNS)</h2>
                    <p>Includes physical harm, mental harassment, and dowry-related abuse. Punishment: Up to 3 years and fine.</p>
                    <h2>5️⃣ Dowry Prohibition Act, 1961</h2>
                    <p>Giving or taking dowry is an offence. Punishment: 5 years imprisonment and fine.</p>
                </div>

                <div class="law-section">
                    <h2>6️⃣ Sexual Harassment at Workplace Act, 2013</h2>
                    <p>Provides safe working environment and Internal Complaints Committee (ICC). Consequences: Disciplinary action, termination, or prosecution.</p>
                    <h2>7️⃣ Acid Attack Laws</h2>
                    <p>Punishment: Minimum 10 years to Life imprisonment. Fine goes to survivor rehabilitation.</p>
                </div>

                <div class="law-section">
                    <h2>Systemic Objectives of These Laws</h2>
                    <ul>
                        <li>Protect dignity and bodily autonomy</li>
                        <li>Ensure safety across environments</li>
                        <li>Provide survivor remedies</li>
                        <li>Deter criminal behaviour</li>
                    </ul>
                    <h3>Practical Challenges</h3>
                    <p>Underreporting persists, judicial delays remain, social stigma impacts complaints, and evidence challenges affect convictions.</p>
                </div>`,
                conclusion: "India’s legal framework provides extensive safeguards for women’s safety. However, laws achieve true impact only when supported by effective implementation, institutional sensitivity, and societal responsibility. Legal literacy remains a critical tool for empowerment.",
                thanks: "Thank you for taking the time to read and engage with this awareness initiative.",
                commTitle: "Leave a Comment"
            },
            hi: {
                title: "महिलाओं की सुरक्षा के लिए कानून और अधिकार",
                sub: "भारत में महिलाओं की सुरक्षा के लिए कानूनी ढांचा",
                intro: "भारत ने महिलाओं को हिंसा, दुर्व्यवहार, उत्पीड़न और शोषण से बचाने के लिए एक व्यापक कानूनी ढांचा स्थापित किया है। इन कानूनों को समझना जागरूकता, रोकथाम और न्याय तक पहुंच के लिए आवश्यक है।",
                laws: `
                <div class="law-section">
                    <h2>1️⃣ भारतीय न्याय संहिता (BNS), 2023</h2>
                    <p>(IPC के स्थान पर)</p>
                    <h3>✔ यौन अपराध</h3>
                    <p><strong>बलात्कार (धारा 63 - BNS):</strong> न्यूनतम 10 वर्ष की जेल, जो आजीवन कारावास या मृत्युदंड तक हो सकती है।</p>
                    <p><strong>यौन उत्पीड़न (धारा 75):</strong> अवांछित शारीरिक संपर्क या टिप्पणी। सजा: 3 साल तक की जेल।</p>
                    <p><strong>पीछा करना (Stalking - धारा 78):</strong> 3 साल तक की सजा और जुर्माना।</p>
                </div>
                <div class="law-section">
                    <h2>2️⃣ पोक्सो (POCSO) अधिनियम, 2012</h2>
                    <p>नाबालिगों (18 से कम) की सुरक्षा के लिए विशेष कानून। इसमें गंभीर मामलों में मृत्युदंड का भी प्रावधान है।</p>
                </div>
                <div class="law-section">
                    <h2>3️⃣ घरेलू हिंसा अधिनियम (PWDVA), 2005</h2>
                    <p>शारीरिक, भावनात्मक, यौन, मौखिक और आर्थिक दुर्व्यवहार को कवर करता है।</p>
                </div>
                <div class="law-section">
                    <h2>4️⃣ दहेज निषेध अधिनियम, 1961</h2>
                    <p>दहेज लेना या देना अपराध है। सजा: 5 वर्ष की जेल और जुर्माना।</p>
                </div>`,
                conclusion: "कानूनी साक्षरता सशक्तिकरण के लिए एक महत्वपूर्ण उपकरण है।",
                thanks: "इस जागरूकता पहल को पढ़ने और इसमें शामिल होने के लिए समय निकालने के लिए धन्यवाद।",
                commTitle: "एक टिप्पणी छोड़ें"
            },
            mr: {
                title: "महिलांच्या सुरक्षिततेसाठी कायदे आणि अधिकार",
                sub: "भारतातील महिलांच्या सुरक्षिततेसाठी कायदेशीर चौकट",
                intro: "भारताने महिलांचे हिंसाचार, छळ आणि शोषणापासून संरक्षण करण्यासाठी व्यापक कायदेशीर चौकट तयार केली आहे. हे कायदे समजून घेणे जागरूकता आणि न्यायासाठी आवश्यक आहे.",
                laws: `
                <div class="law-section">
                    <h2>1️⃣ भारतीय न्याय संहिता (BNS), 2023</h2>
                    <p>बलात्कार (कलम 63): किमान 10 वर्षे ते आजीवन कारावास किंवा फाशीची शिक्षा.</p>
                </div>
                <div class="law-section">
                    <h2>2️⃣ पोक्सो (POCSO) कायदा, 2012</h2>
                    <p>18 वर्षांखालील मुलांच्या संरक्षणासाठी विशेष कायदा.</p>
                </div>
                <div class="law-section">
                    <h2>3️⃣ कौटुंबिक हिंसाचार प्रतिबंधक कायदा, 2005</h2>
                    <p>शारीरिक, मानसिक आणि आर्थिक छळाविरुद्ध संरक्षण.</p>
                </div>`,
                conclusion: "कायदेशीर साक्षरता हे सक्षमीकरणाचे महत्त्वाचे साधन आहे.",
                thanks: "या जागरूकता उपक्रमात वेळ दिल्याबद्दल धन्यवाद.",
                commTitle: "तुमची प्रतिक्रिया द्या"
            }
        };

        function updateContent(lang) {
            const l = data[lang];
            
            // Set active button
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Header
            document.getElementById('page-header').innerHTML = `<h1>${l.title}</h1><p>${l.sub}</p>`;
            
            // Content
            let fullHtml = `<div class="law-section"><p>${l.intro}</p></div>`;
            fullHtml += l.laws;
            fullHtml += `<div class="law-section"><h2>Conclusion</h2><p>${l.conclusion}</p></div>`;
            
            document.getElementById('main-content').innerHTML = fullHtml;
            document.getElementById('thanks').innerText = l.thanks;
            document.getElementById('comment-title').innerText = l.commTitle;
        }
        async function postComment() {
    const nameInput = document.getElementById('name');
    const commentInput = document.getElementById('comment');
    
    const name = nameInput.value;
    const comment = commentInput.value;

    if(!name || !comment) {
        alert("Please fill both fields");
        return;
    }

    try {
        const response = await fetch("https://hersafety-journal-1.onrender.com/comment", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, comment })
        });

        if (response.ok) {
            nameInput.value = '';
            commentInput.value = '';
            loadComments(); // Comment save hone ke baad list refresh karein
        }
    } catch (error) {
        console.error("Error posting comment:", error);
        alert("Backend server start hai? Please check karein.");
    }
}
       async function loadComments() {
    try {
        const response = await fetch("https://hersafety-journal-1.onrender.com/comment");
        const comments = await response.json();
        
        const list = document.getElementById('comment-list');
        list.innerHTML = ''; // Purani list clear karein

        comments.forEach(item => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `<strong>${item.name}</strong><p>${item.comment}</p>`;
            list.appendChild(div);
        });
    } catch (error) {
        console.error("Error loading comments:", error);
    }
}

// Page load hote hi comments dikhane ke liye
window.onload = loadComments; 
    

        

        // Init
        updateContent('en');
    </script>
</body>

</html>
