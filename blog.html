<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Crimes Against Women in India Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --deep-wine: #1A0505;
            --secondary-surface: #2D0A0A;
            --accent-burgundy: #800020;
            --accent-pink: #FF5E6C;
            --text-light: #FFF5F5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at 50% 50%, #2d0a0a 0%, #1a0505 100%);
            min-height: 100vh;
            color: var(--text-light); 
            font-family: 'Segoe UI', sans-serif; 
            line-height: 1.6; 
        }
        .lang-nav { 
            position: sticky; top: 0; 
            background: rgba(45, 10, 10, 0.95); 
            padding: 15px; display: flex; justify-content: center; gap: 15px; 
            border-bottom: 2px solid var(--accent-pink); z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        .lang-btn { background: transparent; border: 1px solid var(--accent-pink); color: white; padding: 8px 18px; cursor: pointer; border-radius: 20px; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--accent-pink); color: var(--deep-wine); }
        .container { max-width: 900px; margin: 40px auto; padding: 35px; background: rgba(45, 10, 10, 0.5); border-radius: 20px; border: 1px solid rgba(255, 94, 108, 0.1); backdrop-filter: blur(10px); }
        h1, h2, h3 { color: var(--accent-pink); margin-top: 1.5em; }
        .data-card { background: rgba(128, 0, 32, 0.2); padding: 20px; border-radius: 10px; margin: 15px 0; border-left: 4px solid var(--accent-pink); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid rgba(255,94,108,0.2); padding: 12px; text-align: left; }
        th { background: var(--accent-burgundy); color: white; }
        ul { padding-left: 20px; }
        li { margin-bottom: 10px; opacity: 0.9; }
        .intro-title { font-size: 2.2rem; text-align: center; margin-bottom: 10px; }
        .divider { height: 1px; background: rgba(255, 94, 108, 0.3); margin: 30px 0; }

        .comment-area { background: rgba(45, 10, 10, 0.5); padding: 40px; border-radius: 20px; margin: 40px auto; max-width: 900px; border: 1px solid rgba(255,94,108,0.1); }
        .comment-form input, .comment-form textarea { width: 100%; background: var(--secondary-surface); border: 1px solid rgba(255,94,108,0.3); color: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .comment-submit-btn { background: var(--accent-pink); color: var(--deep-wine); border: none; padding: 12px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .comment-list { margin-top: 30px; }
        .comment-item { background: rgba(128,0,32,0.15); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #FF5E6C; }
    </style>
</head>
<body>

    <div class="lang-nav">
        <button class="lang-btn active" onclick="updateLang('en')">English</button>
        <button class="lang-btn" onclick="updateLang('hi')">हिंदी</button>
        <button class="lang-btn" onclick="updateLang('mr')">मराठी</button>
    </div>

    <div class="container" id="content"></div>

    <div class="comment-area">
        <h2 style="color:#FF5E6C; margin-bottom:20px;">💬 Comments</h2>
        <div class="comment-form">
            <input type="text" id="c-name" placeholder="Your Name" />
            <textarea id="c-text" rows="4" placeholder="Your Thought"></textarea>

        </div>
        <div id="c-list" class="comment-list"></div>

        function updateLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const btn = Array.from(document.querySelectorAll('.lang-btn')).find(b =>
                b.textContent.toLowerCase().includes(lang === 'hi' ? 'हिंदी' : lang === 'mr' ? 'मराठी' : 'english')
            );
            if (btn) btn.classList.add('active');

            const d = translations[lang];
            document.getElementById('content').innerHTML = `
                <h1 class="intro-title">${d.mainTitle}</h1>
                <div class="divider"></div>
                <h3>${d.intro}</h3><p>${d.introP}</p>
                <div class="data-card">
                    <h3>${d.natOverview}</h3>
                    <p>${d.natP1}</p>
                    <ul>${d.natList.map(i => `<li>${i}</li>`).join('')}</ul>
                    <p><strong>${d.chargeSheet}</strong></p>
                </div>
                <h3>${d.stateData}</h3><p>${d.stateP1}</p>
                <p><strong>${d.topStates}</strong></p>
                <ul>${d.stateList.map(i => `<li>${i}</li>`).join('')}</ul>
                <p><strong>${d.crimeRate}</strong></p>
                <ul>${d.rateList.map(i => `<li>${i}</li>`).join('')}</ul>
                <div class="data-card">
                    <h3>${d.rapeData}</h3>
                    <p>${d.rapeP1}</p><p>${d.rapeP2}</p>
                    <p><em>${d.insight}</em></p>
                </div>
                <h3>${d.conviction}</h3><p>${d.convP1}</p><p><small>${d.convP2}</small></p>
                <h3>${d.seniorData}</h3><p>${d.seniorP1}</p>
                <ul>${d.seniorList.map(i => `<li>${i}</li>`).join('')}</ul>
                <p><strong>${d.seniorP2}</strong></p>
                <div class="data-card">
                    <h3>${d.domTrend}</h3><p>${d.domP1}</p>
                    <ul>${d.domList.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>
                <h3>${d.estimated}</h3><p>${d.estP1}</p><p>${d.estP2}</p>
                <h3>${d.mapTitle}</h3>
                <table>
                    <tr><th>State</th><th>Rape Cases (2022)</th></tr>
                    <tr><td>Rajasthan</td><td>5,399</td></tr>
                    <tr><td>Uttar Pradesh</td><td>3,690</td></tr>
                    <tr><td>Madhya Pradesh</td><td>3,029</td></tr>
                    <tr><td>Maharashtra</td><td>2,904</td></tr>
                    <tr><td>Haryana</td><td>1,787</td></tr>
                </table>
                <div class="data-card" style="border-left-color:#00ff88;">
                    <h3>${d.keyTake}</h3>
                    <ul>${d.takeList.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>
                <h3>${d.conclusion}</h3><p>${d.conclusionP}</p>
            `;
        }

        function submitCmt() {
            var n = document.getElementById("c-name").value;
            var t = document.getElementById("c-text").value;
            if (!n || !t) { alert("Please fill both fields"); return; }
            fetch("https://hersafety-journal-1.onrender.com/comment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: n, comment: t })
            }).then(function(r) {
                if (r.ok) {
                    document.getElementById("c-name").value = "";
                    document.getElementById("c-text").value = "";
                    loadCmt();
                }
            }).catch(function() { alert("Backend chal raha hai? Run: python app.py"); });
        }

        function loadCmt() {
            fetch("https://hersafety-journal-1.onrender.com/comment")
                .then(function(r) { return r.json(); })
                .then(function(items) {
                    var list = document.getElementById("c-list");
                    list.innerHTML = "";
                    items.forEach(function(item) {
                        var div = document.createElement("div");
                        div.className = "comment-item";
                        div.innerHTML = "<strong>" + item.name + "</strong><p>" + item.comment + "</p>";
                        list.appendChild(div);
                    });
                }).catch(function(e) { console.error(e); });
        }

        window.addEventListener("load", function() {
            updateLang('en');
            loadCmt();
        });
    </script>
</body>
</html>
