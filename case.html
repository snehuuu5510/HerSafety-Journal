<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Major Cases | HerSafety Awareness</title>

    <style>
        :root {
            --deep-wine: #1A0505;
            --secondary-surface: #2D0A0A;
            --accent-burgundy: #800020;
            --accent-pink: #FF5E6C;
            --text-light: #FFF5F5;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-wine);
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Cinematic Background */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(128, 0, 32, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 94, 108, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .bg-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
            z-index: -1;
        }

        /* Language Switcher */
        .header-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(26, 5, 5, 0.9), transparent);
        }

        .lang-btn {
            background: rgba(45, 10, 10, 0.6);
            border: 1px solid rgba(255, 94, 108, 0.3);
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        .lang-btn:hover, .lang-btn.active {
            background: var(--accent-pink);
            color: var(--deep-wine);
            border-color: var(--accent-pink);
            font-weight: bold;
        }

        /* Page Header */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            animation: fadeIn 1.5s ease;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--accent-pink);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 94, 108, 0.3);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            opacity: 0.8;
            font-weight: 300;
        }

        /* Content Container */
        .content-section {
            max-width: 1000px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .intro-block {
            background: rgba(45, 10, 10, 0.4);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 60px;
            border: 1px solid rgba(255, 94, 108, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Case Cards Styles */
        .case-card {
            background: var(--secondary-surface);
            margin-bottom: 40px;
            border-radius: 15px;
            padding: 40px;
            position: relative;
            border: 1px solid rgba(255, 94, 108, 0.05);
            transition: var(--transition);
            transform: translateY(50px);
            opacity: 0;
        }

        .case-card.reveal {
            transform: translateY(0);
            opacity: 1;
        }

        .case-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-pink);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .case-num {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(255, 94, 108, 0.05);
            z-index: 0;
        }

        .case-card h2 {
            color: var(--accent-pink);
            font-size: 2rem;
            margin-bottom: 15px;
            position: relative;
        }

        .impact-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(128, 0, 32, 0.2);
            border-left: 4px solid var(--accent-pink);
            border-radius: 0 8px 8px 0;
        }

        .impact-box h4 {
            color: var(--accent-pink);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .impact-box ul {
            list-style: none;
        }

        .impact-box li::before {
            content: "•";
            color: var(--accent-pink);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }

        .impact-box li { margin-bottom: 8px; padding-left: 1em; }

        /* Generic Sections */
        .conclusion-block {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, var(--accent-burgundy), var(--deep-wine));
            border-radius: 20px;
            margin-top: 80px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .case-card { padding: 25px; }
        }
    </style>
</head>

                        title: "घरगुती हिंसाचार (व्यापक स्वरूप)",
                        desc: "मोठ्या लैंगिक हिंसाचाराच्या प्रकरणांना माध्यमांचे लक्ष मिळते, परंतु छळाचा मोठा भाग घरगुती वातावरणात घडतो. हजारो महिला दरवर्षी शारीरिक हिंसाचार आणि मानसिक छळाची तक्रार करतात.",
                        impact: ["घरगुती छळाला गंभीर कायदेशीर मुद्दा म्हणून मान्यता", "कलम 498A बद्दल वाढलेली जागरूकता", "मदत सेवा आणि हेल्पलाईनचा विस्तार"]
                    }
                ],
                sysObs: "<h3>प्रणालीगत निरीक्षणे</h3><p>✔ न्यायासाठी विलंब<br>✔ पीडितेची असुरक्षितता<br>✔ सामाजिक कलंक<br>✔ संस्थागत आव्हाने<br>✔ माध्यमांचा प्रभाव</p>",
                conclusion: "<h2>निष्कर्ष</h2><p>प्रमुख गुन्हेगारी खटले सामाजिक जागरूकता आणि कायदेशीर उत्क्रांती घडवण्यात महत्त्वाची भूमिका बजावतात. न्याय केवळ कायद्यांनी ठरत नाही, तर त्यांच्या प्रभावी अंमलबजावणीने ठरतो.</p>"
            }
        };

        function setLang(lang) {
            const d = content[lang];
            
            // Buttons UI
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(lang === 'en' ? 'english' : lang === 'hi' ? 'हिंदी' : 'मराठी')) {
                    btn.classList.add('active');
                }
            });

            // Hero
            document.getElementById('hero-title').innerText = d.heroTitle;
            document.getElementById('hero-sub').innerText = d.heroSub;

            // Intro
            document.getElementById('intro-content').innerHTML = d.intro + d.sysObs;

            // Cases
            const container = document.getElementById('cases-container');
            container.innerHTML = '';
            d.cases.forEach(c => {
                const card = document.createElement('div');
                card.className = 'case-card';
                card.innerHTML = `
                    <div class="case-num">${c.id}</div>
                    <h2>${c.title}</h2>
                    <p>${c.desc}</p>
                    <div class="impact-box">
                        <h4>IMPACT</h4>
                        <ul>
                            ${c.impact.map(i => `<li>${i}</li>`).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(card);
            });

            // Conclusion
            document.getElementById('conclusion-content').innerHTML = d.conclusion;

            // Re-trigger scroll reveal
            reveal();
        }

        // Scroll Reveal Logic
        function reveal() {
            var reveals = document.querySelectorAll(".case-card");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("reveal");
                }
            }
        }

        window.addEventListener("scroll", reveal);

        // Initial Load
        setLang('en');
    </script>
</body>
</html>
