<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog & Awareness | HerSafety Journal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --deep-wine: #1A0505;
            --secondary-surface: #2D0A0A;
            --accent-burgundy: #800020;
            --accent-pink: #FF5E6C;
            --text-light: #FFF5F5;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--deep-wine);
            color: var(--text-light);
            line-height: 1.8;
            background: radial-gradient(circle at 50% 50%, #2d0a0a 0%, #1a0505 100%);
            min-height: 100vh;
        }

        /* Language Switcher */
        .header-tools {
            position: fixed;
            top: 20px; right: 5%;
            z-index: 1001;
            display: flex; gap: 10px;
            background: rgba(45, 10, 10, 0.8);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 94, 108, 0.3);
        }

        .lang-btn {
            background: transparent; border: none;
            color: white; cursor: pointer; padding: 5px 12px;
            border-radius: 20px; transition: var(--transition);
            font-weight: 600; font-size: 0.9rem;
        }

        .lang-btn.active { background: var(--accent-pink); color: var(--deep-wine); }

        /* Header */
        .blog-header { padding: 100px 5% 40px; text-align: center; }
        .blog-header h1 { font-size: 3rem; color: var(--accent-pink); margin-bottom: 10px; letter-spacing: 2px; }
        .blog-header p { opacity: 0.8; font-size: 1.1rem; }

        /* Tabs Navigation */
        .tabs-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 10%;
            margin-bottom: 50px;
        }

        .tab-card {
            background: var(--secondary-surface);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 94, 108, 0.1);
            transition: var(--transition);
        }

        .tab-card i { font-size: 2.5rem; color: var(--accent-pink); margin-bottom: 15px; }
        .tab-card.active { 
            background: var(--accent-burgundy); 
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 94, 108, 0.2);
        }
        .tab-card:hover { transform: translateY(-5px); border-color: var(--accent-pink); }

        /* Content Area */
        .content-display {
            max-width: 1000px;
            margin: 0 auto 100px;
            padding: 50px;
            background: rgba(45, 10, 10, 0.5);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 94, 108, 0.05);
            animation: fadeIn 0.6s ease;
        }

        .article-section { margin-bottom: 40px; }
        .article-section h2 { color: var(--accent-pink); font-size: 2rem; margin-bottom: 20px; border-left: 5px solid var(--accent-pink); padding-left: 15px; }
        .article-section h3 { color: var(--accent-pink); margin: 25px 0 15px; font-size: 1.4rem; }
        .article-section p { margin-bottom: 15px; opacity: 0.9; }
        .article-section ul { padding-left: 20px; margin-bottom: 15px; }
        .article-section li { margin-bottom: 10px; opacity: 0.9; }

        /* Stats Table */
        .data-table {
            width: 100%; border-collapse: collapse; margin: 20px 0;
            background: rgba(255, 255, 255, 0.02);
        }
        .data-table th, .data-table td { padding: 12px; border: 1px solid rgba(255, 94, 108, 0.2); text-align: left; }
        .data-table th { background: var(--accent-burgundy); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .tabs-nav { padding: 0 5%; }
            .content-display { padding: 25px; margin: 0 5% 50px; }
            .blog-header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="header-tools">
        <button class="lang-btn active" onclick="setLang('en')">English</button>

    <div class="content-display" id="content-area">
        </div>

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update UI Labels
            const labels = {
                en: ["Blog & Awareness", "Data analysis on protection", "Minor (Under 18)", "Adult Women", "Women (35+ Age)"],
                hi: ["ब्लॉग और जागरूकता", "सुरक्षा पर डेटा विश्लेषण", "नाबालिग (18 से कम)", "वयस्क महिलाएं", "महिलाएं (35+ आयु)"],
                mr: ["ब्लॉग आणि जागरूकता", "सुरक्षेवर डेटा विश्लेषण", "अल्पवयीन (18 वर्षांखालील)", "प्रौढ महिला", "महिला (35+ वयोगट)"]
            };
            
            document.getElementById('main-title').innerText = labels[lang][0];
            document.getElementById('main-subtitle').innerText = labels[lang][1];
            document.getElementById('t-minor').innerText = labels[lang][2];
            document.getElementById('t-adult').innerText = labels[lang][3];
            document.getElementById('t-senior').innerText = labels[lang][4];
            
            loadContent(currentCategory);
        }

        function loadContent(category) {
            currentCategory = category;
            document.querySelectorAll('.tab-card').forEach(card => card.classList.remove('active'));
            document.getElementById('tab-' + category).classList.add('active');

            const content = dataContent[currentLang][category];
            const shared = dataContent[currentLang].shared;
            const area = document.getElementById('content-area');

            area.innerHTML = `
                <div class="article-section">
                    <h2>${content.title}</h2>
                    <p>${content.p1}</p>
                    <p>${content.p2}</p>
                    <p>${content.p3}</p>
                    <p>${content.p4}</p>
